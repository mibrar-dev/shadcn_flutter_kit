name: flutter_cli_verification_example
description: A new Flutter project.
publish_to: none
version: 1.0.0+1
environment:
  sdk: ^3.11.0
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  data_widget: ^0.0.2
  gap: ^3.0.1
dev_dependencies:
