name: flutter_shadcn_kit
description: "A Flutter registry package for shadcn-style components, themes, and shared primitives."

version: 1.0.0+1

environment:
  sdk: ^3.10.7

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.8
  email_validator: ^3.0.0
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  skeletonizer: ^2.1.0+1
  country_flags: ^4.1.0
  phonecodes: ^0.0.4
  cross_file: ^0.3.4+2
  web: ^1.1.1
  data_widget: ^0.0.2
  gap: ^3.0.1
  expressions: ^0.2.5+2
  animation_kit: ^0.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^6.0.0
  analyzer: ^6.4.1
  crypto: ^3.0.6
  glob: ^2.1.2
  file: ^7.0.0
  yaml: ^3.1.3

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  fonts:
    - family: LucideIcons
      fonts:
        - asset: assets/fonts/lucide.ttf
    - family: RadixIcons
      fonts:
        - asset: assets/fonts/radix.otf
    - family: BootstrapIcons
      fonts:
        - asset: assets/fonts/bootstrap.otf
    - family: NotoSansSymbols2
      fonts:
        - asset: assets/fonts/NotoSansSymbols2-Regular.ttf
    - family: GeistSans
      fonts:
        - asset: assets/fonts/Geist-Black.otf
          weight: 800
        - asset: assets/fonts/Geist-BlackItalic.otf
          weight: 800
          style: italic
        - asset: assets/fonts/Geist-Bold.otf
          weight: 700
        - asset: assets/fonts/Geist-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/Geist-ExtraLightItalic.otf
          weight: 200
          style: italic
        - asset: assets/fonts/Geist-Light.otf
          weight: 300
        - asset: assets/fonts/Geist-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/Geist-Medium.otf
          weight: 500
        - asset: assets/fonts/Geist-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/Geist-Regular.otf
          weight: 400
        - asset: assets/fonts/Geist-RegularItalic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/Geist-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Geist-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: assets/fonts/Geist-Thin.otf
          weight: 100
        - asset: assets/fonts/Geist-ThinItalic.otf
          weight: 100
          style: italic
        - asset: assets/fonts/Geist-UltraLight.otf
          weight: 200
        - asset: assets/fonts/Geist-UltraBlack.otf
          weight: 900
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Black.otf
          weight: 800
        - asset: assets/fonts/GeistMono-BlackItalic.otf
          weight: 800
          style: italic
        - asset: assets/fonts/GeistMono-Bold.otf
          weight: 700
        - asset: assets/fonts/GeistMono-BoldItalic.otf
          weight: 700
          style: italic
        - asset: assets/fonts/GeistMono-ExtraLightItalic.otf
          weight: 200
          style: italic
        - asset: assets/fonts/GeistMono-Light.otf
          weight: 300
        - asset: assets/fonts/GeistMono-LightItalic.otf
          weight: 300
          style: italic
        - asset: assets/fonts/GeistMono-Medium.otf
          weight: 500
        - asset: assets/fonts/GeistMono-MediumItalic.otf
          weight: 500
          style: italic
        - asset: assets/fonts/GeistMono-Regular.otf
          weight: 400
        - asset: assets/fonts/GeistMono-Italic.otf
          weight: 400
          style: italic
        - asset: assets/fonts/GeistMono-SemiBold.otf
          weight: 600
        - asset: assets/fonts/GeistMono-SemiBoldItalic.otf
          weight: 600
          style: italic
        - asset: assets/fonts/GeistMono-Thin.otf
          weight: 100
        - asset: assets/fonts/GeistMono-ThinItalic.otf
          weight: 100
          style: italic
        - asset: assets/fonts/GeistMono-UltraLight.otf
          weight: 200
        - asset: assets/fonts/GeistMono-UltraBlack.otf
          weight: 900

  assets:
    - assets/markdown/
    - assets/markdown/markdown_feature_showcase.md

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
